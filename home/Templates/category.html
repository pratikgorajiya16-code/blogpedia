<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <!-- <link rel="stylesheet" href="greet.css"> -->

<style>
    * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Times New Roman', Times, serif;
    height: 100vh;
    overflow: hidden; /* Prevent page scroll, we'll scroll inside .container */
}

#taskbar {
    position: fixed;
    top: 20px; /* below #intro */
    left: 0;
    width: 250px;
    height: 100%;
    background-color:burlywood;
    padding-top: 20px;
    display: flex;
    flex-direction: column;
}

.taskbar-button {
    display: block;
    padding: 15px 20px;
    margin: 10px;
    background-color:antiquewhite;
    font-size: 16px;
    font-style: oblique;
    border: 0;
    color: black;
    opacity: 0.6;
    transition: 0.3s;
    cursor: pointer;
}

button{
    color: black;
    opacity: 0.6;
    transition: 0.3s;
    cursor: pointer;
    background-color:antiquewhite;
}

button:hover{opacity: 1;}

/* The scrollable content area */
.container {
    position: fixed;
    top: 20px; /* below #intro */
    left: 250px; /* next to #taskbar */
    right: 0;
    bottom: 0;
    overflow-y: auto;
    padding: 20px;
}

.layout-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 10px;
}

/* Each blog card */
.generated-layout {
    position: relative;
    width: 500px;
    height: 250px;
    border: 1px solid #ccc;
    padding: 50px;
    box-sizing: border-box;
    text-align: center;
    background-color:royalblue;
    opacity: 1;
    transition: 0.3s;
}

.generated-layout:hover{box-shadow: 4px 4px 10px firebrick;}

.see-all{
    display: flex;
    position: relative;
    left: 95%;
    top: -10px;
    font-size: 15px;
}

</style>
    {{ display_data|json_script:"data-json" }}
    {{ userid|json_script:"user-id" }}
</head>
<body>
    
    <div id="taskbar">
        <button class="taskbar-button" id="Home" onclick="send_data('home',userid)">Home</button>
        <button class="taskbar-button" id="New" onclick="send_data('New',userid)">New</button>
        <button class="taskbar-button" id="Popular" onclick="send_data('Popular',userid)">Popular</button>
        <button class="taskbar-button" id="Category" onclick="send_data('category',userid)">Category</button>
        <button class="taskbar-button" id="profile" onclick="send_data('Profile',userid)">Profile</button>
        <button class="taskbar-button" id="blog_creation" onclick="send_data('write_blog',userid)">Write Blog</button>
    </div>
    <div class="container" id="container">  
        
    </div>
    
    <script>
        const display_data=JSON.parse(document.getElementById("data-json").textContent)
        const userid=document.getElementById("user-id").textContent;
        let Index=0;
        const category_tuple=['Education', 'Entertainment', 'Sports', 'News', 'Psychology', 'Religion', 'Technology', 'Fiction', 'Business', 'Space'];
        const title_text=document.getElementsByTagName("title").textContent;
        document.getElementById(title_text).disabled;

                function send_data(page,data=null) {
    const message = "page_loaded";
    switch (page) {
        case 'home':
            fetch("/Home/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                // body: JSON.stringify({ status: data })
            })
            .then(response => response.json())
            .then(data => {
                console.log("Server response:", data);
            });
            break;
            
        case 'display_blog':
            fetch("/Blog_display/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                body: JSON.stringify({ status: data })
            })
            .then(response => response.json())
            .then(data => {
                console.log("Server response:", data);
            });
            break;
        case 'Profile':
            fetch("/profile/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                body: JSON.stringify({ status: data })
            })
            .then(response => response.json())
            .then(data => {
                console.log("Server response:", data);
            });
            break;
        case 'write_blog':
            fetch("/Blog_creation/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                // body: JSON.stringify({ status: data })
            })
            .then(response => response.json())
            .then(data => {
                console.log("Server response:", data);
            });
            break;
        case 'New':
            fetch("/new/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                // body: JSON.stringify({ status: data })
            })
            .then(response => response.json())
            .then(data => {
                console.log("Server response:", data);
            });
            break;
        case 'Category':
            fetch("/category/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                // body: JSON.stringify({ status: data })
            })
            .then(response => response.json())
            .then(data => {
                console.log("Server response:", data);
            });
            break;
        case "see-all":
            fetch("/Specific_category/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"  // Only needed if you're POSTing from a Django template
                },
                body: JSON.stringify({ status: data})
            })
            .then(response => response.json())
            .then(data => {
                console.log("Server response:", data);
            });
            break;
    }
}

function generateLayoutPair(){
    const container=document.getElementById("container");
    for (var key in display_data) {
        const layoutContainer=document.createElement("div");
        layoutContainer.className="layout-container";
        layoutContainer.id=key;
        const title = document.createElement("h2");
        const button=document.createElement("button");
        button.textContent="see all";
        button.className="see-all";
        button.id=key;
        const specific_category={"userid":userid,"category":key}
        button.addEventListener("click",function(){
            send_data("see-all",specific_category);
        });
        title.style.fontSize="20px";
        title.textContent = key;
        container.appendChild(title);
        container.appendChild(button);
        container.appendChild(layoutContainer);
        let data=sample_data[key];
        for (let j=0; j<5;j++){
            if (data[j]){
                const layoutDiv = document.createElement('div');
                layoutDiv.className = 'generated-layout';
                const object=data[j]
                Index++; 
                const nodeList = createelement(object);
                nodeList.forEach(node => layoutDiv.appendChild(node));
                
                layoutContainer.appendChild(layoutDiv);
                layoutDiv.dataset.blogId=object.Blog_id;
                layoutDiv.addEventListener('click', function () {
                    send_data('display_blog',object.Blog_id)
                    });
            }else{
                return;
            }
        }
    }}

    
    function createelement(object) {
        const nodes = [];
        
        for (const element in object) {
            let node=null;
            switch (element) {
                case 'Blog_title':
                    node = title(object[element]);
                    break;
                    case 'Blog_Author_id':
                        node = generate_author(object[element]);
                        break;
                            case 'Blog_characters':
                                node = Character(object[element]);
                                break;
                                case 'Blog_category':
                                    node = category(object[element]);
                                    break;
                                    case 'Blog_entry_date':
                                        node = date(object[element]);
                        break;
                        case 'Blog_image':
                            node = Image(object[element]);
                            break;
                        default:
                            continue;
                        }
                        if (node) nodes.push(node);
                    }
                    return nodes;
                }
                
                
    function generate_author(content){
        node = document.createElement('p');
        node.textContent = content;
        node.addEventListener("click",function(){
            send_data("Profile",content);
        });
        Object.assign(node.style,{
            fontSize: '14px',
            fontWeight: 'normal',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            position: 'absolute',
            left: '20px',
            top: '20px',
            width: '60px',
            height: '20px'
        });
        return node;
    }
    
    function category(content){
        node = document.createElement('p');
        node.textContent = content;
        Object.assign(node.style,{
            fontSize: '14px',
            fontWeight: 'normal',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            position: 'absolute',
            left: '100px',
            top: '20px',
            width: '60px',
            height: '20px'
        });
        return node;
    }
    
    function title(content){
        node = document.createElement('p');
        node.textContent = content;
        Object.assign(node.style,{
            fontSize: '24px',
            fontWeight: 'bold',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'flex-start',
            position: 'absolute',
            left: '40px', 
            top: '80px',
            width: '200px',
            height: '80px'
        });
        return node;
    }
    
    function Image(content){
        node = document.createElement('img');
        node.src = content;
        node.alt = 'Generated image';
        
        Object.assign(node.style,
        { objectFit: 'contain',
        position: 'absolute',
        left: '320px',
        top: '80px',
        width: '150px',
        height:'120px' });
        return node;
    }
    
    function date(content){
        node = document.createElement('p');
        node.textContent = content;
        Object.assign(node.style, {
            fontSize:'14px',
            fontWeight:'normal',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            position: 'absolute',
            left: '20px',
            top: '200px',
            width: '40px',
            height: '20px'
        });
        return node;
    }
    
    function Character(content){
        node = document.createElement('p');
        node.textContent = content;
        Object.assign(node.style, {
            fontSize: '14px',
            fontWeight: 'normal',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            position: 'absolute',
            left: '160px',
            top: '200px',
            width: '40px',
            height: '20px'
        });
        return node;
    }
    
    
    
    document.addEventListener('DOMContentLoaded', () => {
        generateLayoutPair(); 
    });
