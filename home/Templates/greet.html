body {

#taskbar {
    position: fixed;
    top: 20px; /* below #intro */
    left: 0;
    width: 250px;
    height: 100%;
    background-color:burlywood;
    padding-top: 20px;
    display: flex;
    flex-direction: column;
}

.taskbar-button {
    display: block;
    padding: 15px 20px;
    margin: 10px;
    background-color:antiquewhite;
    font-size: 16px;
    font-style: oblique;
    border: 0;
    color: black;
    opacity: 0.6;
    transition: 0.3s;
    cursor: pointer;
}

.taskbar-button:hover{opacity: 1;}

/* The scrollable content area */
.container {
    position: fixed;
    top: 20px; /* below #intro */
    left: 250px; /* next to #taskbar */
    right: 0;
    bottom: 0;
    overflow-y: auto;
    padding: 20px;
}

.layout-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 10px;
}

/* Each blog card */
.generated-layout {
    position: relative;
    width: 500px;
    height: 250px;
    border: 1px solid #ccc;
    padding: 50px;
    box-sizing: border-box;
    text-align: center;
    background-color:royalblue;
    opacity: 1;
    transition: 0.3s;
}

.generated-layout:hover{box-shadow: 4px 4px 10px firebrick;}

</style>

    const layoutContainer = document.getElementById('layoutContainer');
    
    function generateLayoutPair() {
        for (let i = 0; i < 2; i++) {
            const layoutDiv = document.createElement('div');
            layoutDiv.className = 'generated-layout';
            
            if (Display_data[Index]){
                const object=Display_data[Index]
                Index++;
                const nodeList = createelement(object);
                nodeList.forEach(node => layoutDiv.appendChild(node));
                
                layoutContainer.appendChild(layoutDiv);
                layoutDiv.dataset.blogId=object.Blog_id;
                layoutDiv.addEventListener('click', function () {
                    send_data('display_blog',object.Blog_id)
                });
            }else{
                return;
            }
        }
    }
    
    function createelement(object) {
        const nodes = [];
        
        for (const element in object) {
            let node=null;
            switch (element) {
                case 'Blog_title':
                    node = title(object[element]);
                    break;
                    case 'Blog_Author_id':
                        node = generate_author(object[element]);
                        break;
                        case 'Blog_characters':
                            node = Character(object[element]);
                            break;
                                case 'Blog_category':
                                    node = category(object[element]);
                                    break;
                                    case 'Blog_entry_date':
                                        node = date(object[element]);
                                        break;
                                        case 'image_uri':
                                            node = Image(object[element]);
                                            break;
                                            default:
                            continue;
                        }
                        if (node) nodes.push(node);
                    }
                    return nodes;
                }
                
                
                function generate_author(content){
        node = document.createElement('p');
        node.textContent = content;
        node.addEventListener("click",function(){
            send_data("Profile",content);
        });
        Object.assign(node.style,{
            fontSize: '14px',
            fontWeight: 'normal',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            position: 'absolute',
            left: '20px',
            top: '20px',
            width: '60px',
            height: '20px'
        });
        return node;
    }
    
    function category(content){
        node = document.createElement('p');

    }
    
    function title(content){
        node = document.createElement('p');
        node.textContent = content;
        Object.assign(node.style,{
            fontSize: '48px',
            fontWeight: 'bold',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'flex-start',
            position: 'absolute',
            left: '40px', 
            top: '80px',
            width: '200px',
            height: '80px'
        });
        return node;
    }
    
    function Image(content){
        node = document.createElement('img');
        node.src = content;
        node.alt = 'Generated image';
        
        Object.assign(node.style,
        { objectFit: 'contain',
        position: 'absolute',
        left: '320px',
        top: '80px',
        width: '150px',
        height:'120px' });
        return node;
    }
    
    function date(content){
        node = document.createElement('p');
        node.textContent = content;
        Object.assign(node.style, {
            fontSize:'14px',
            fontWeight:'normal',
            display: 'flex',
            alignItems: 'center',

            left: '20px',

    function Character(content){

            width: '40px',
            height: '20px'
        });
        return node;
    }

        generateLayoutPair(); // Initial pair

        generateLayoutPair();
    });
    
    window.addEventListener('scroll', () => {
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 2) {
            generateLayoutPair();
            generateLayoutPair();
